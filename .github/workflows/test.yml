name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install ruff mypy sqlalchemy-stubs "bandit[toml]"

      - name: Ruff check
        run: ruff check sqlalchemy_cubrid/

      - name: Ruff format check
        run: ruff format --check sqlalchemy_cubrid/

      - name: Bandit security check
        run: bandit -c pyproject.toml -r sqlalchemy_cubrid/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        cubrid-version: ["10.2", "11.0", "11.2", "11.3", "11.4"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    services:
      cubrid:
        image: cubrid/cubrid:${{ matrix.cubrid-version }}
        env:
          CUBRID_DB: testdb
        ports:
          - 33000:33000
        options: >-
          --health-cmd "echo 'SELECT 1' | csql -u dba testdb || true"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Wait for CUBRID
        run: |
          for i in $(seq 1 30); do
            poetry run python -c "
          import pycubrid
          try:
              conn = pycubrid.connect('localhost', 33000, 'testdb', 'dba', '')
              conn.close()
              print('CUBRID is ready')
              exit(0)
          except:
              exit(1)
          " && break || sleep 2
          done

      - name: Run custom tests
        run: |
          poetry run pytest tests/ \
            --ignore=tests/test_suite.py \
            -v --tb=short \
            --cov=sqlalchemy_cubrid --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        if: matrix.cubrid-version == '11.4' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run SA official test suite
        run: |
          poetry run pytest tests/test_suite.py \
            -p tests.conftest_suite \
            --dburi 'cubrid://dba:@localhost:33000/testdb' \
            -q --tb=no || true
